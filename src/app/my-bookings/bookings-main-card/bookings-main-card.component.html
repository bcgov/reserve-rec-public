<a [routerLink]="['/account/bookings', bookingId]" class="text-decoration-none text-dark d-block h-100 booking-card-link" [attr.aria-label]="ariaLabel || 'View booking details'">
  <div class="card h-100 p-3 booking-card">
    <div class="mb-1">
      <strong class="text-primary fs-5">{{ geozoneName }}</strong>
    </div>
    <div class="text-muted mb-3 fs-5">
      {{ productName }}
    </div>
    <div class="text-body-emphasis mb-2">
      {{ activityType }}
    </div>
    <div *ngIf="isCancelled" class="text-danger mb-2">Cancelled</div>
    <div [class]="{ 'text-muted': isCancelled, 'text-body-emphasis': !isCancelled }">
      {{ formattedDate }}
    </div>
  </div>
</a>
