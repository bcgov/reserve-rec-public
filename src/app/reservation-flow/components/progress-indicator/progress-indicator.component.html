  <!-- Current Item Steps (Bootstrap Nav Pills Style) -->
  <div class="card mb-3">
    <div class="card-body">
      <div class="mb-3">
        <h6 class="card-subtitle text-muted mb-0">
          <i class="fa-solid fa-list-check me-2"></i>
          Reservation Steps
        </h6>
      </div>

      <nav class="nav nav-pills nav-justified">
        <div 
          *ngFor="let step of stepperService.getSteps(); let i = index"
          class="nav-item flex-fill"
        >
          <button
            type="button"
            class="nav-link w-100 position-relative"
            [class.active]="step.isActive"
            [class.text-primary]="step.isActive"
            [class]="getStepClasses(step)"
            (click)="onStepClick(i)"
          >
            <!-- Step Number and Title on same line, left-aligned -->
            <div class="d-flex align-items-center">
              <span 
                class="d-flex align-items-center justify-content-center me-2"
                [class.text-success]="isStepCompletedForCurrentItem(step, i)"
                [class.text-primary]="step.isActive && !isStepCompletedForCurrentItem(step, i)"
                [class.text-secondary]="!step.isActive && !isStepCompletedForCurrentItem(step, i)"
                style="width: 32px; font-size: 20px;"
              >
                <i *ngIf="isStepCompletedForCurrentItem(step, i)" 
                   class="fa-regular fa-circle-check"></i>
                <span *ngIf="!isStepCompletedForCurrentItem(step, i)" class="fw-semibold">
                  {{ i + 1 }}
                </span>
              </span>
              <span 
                class="fw-semibold" 
                [class.text-success]="isStepCompletedForCurrentItem(step, i)"
                style="font-size: 13px;">
                {{ getStepTitle(step, i) }}
              </span>
            </div>
          </button>
        </div>
      </nav>
    </div>
  </div>
</div>
