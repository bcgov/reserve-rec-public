<!-- Equipment Card -->
<div class="card mb-4">
  <div class="card-header bg-booking-header">
    <h4 class="mb-0">Equipment</h4>
  </div>
  <div class="card-body">
    <h5 class="mb-3">Vehicle Information</h5>
    <p class="text-muted mb-4">Please enter the following details of the vehicle you'll be travelling in. You can change this after the booking.</p>

    <!-- Vehicle Information Form -->
    <div class="row">
      <div class="col-md-6">
        <ngds-text-input
          label="Plate Number"
          [control]="form?.get('equipmentInfo')?.get('licensePlate')"
          placeholder="Enter license plate number"
        >
          <div ngdsInputPrepend>
            <i class="fa-solid fa-car ms-3"></i>
          </div>
        </ngds-text-input>
      </div>
      <div class="col-md-6">
        <div class="mb-3">
          <label for="registeredProvince" class="form-label">Province/State/Other</label>
          <div class="input-group">
            <span class="input-group-text">
              <i class="fa-solid fa-map-location-dot"></i>
            </span>
            <input
              id="registeredProvince"
              type="text"
              class="form-control"
              placeholder="Start typing to search..."
              [formControl]="$any(form?.get('equipmentInfo')?.get('registeredProvince'))"
              [typeahead]="provincesStates"
              [typeaheadOptionsLimit]="5"
              [typeaheadMinLength]="0"
            />
          </div>
          <small class="form-text text-muted">Select or type your province/state/other</small>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Navigation Buttons -->
<div class="d-flex justify-content-between border-top pt-3">
  <button
    type="button"
    class="btn btn-outline-primary mb-3"
    (click)="goToPrevious()"
  >
    <i class="fa-solid fa-chevron-left me-2"></i>
    Back
  </button>
  <button
    type="button"
    class="btn btn-primary mb-3"
    [disabled]="!isStepValid()"
    (click)="goToNext()"
  >
    Continue
    <i class="fa-solid fa-chevron-right ms-2"></i>
  </button>
</div>
