<div class="container-fluid">
  <div class="row justify-content-center">
    <div class="col-lg-10 col-12">
      <h2 class="text-dark fw-bold mb-3">{{ cartItem?.geoZoneName || 'Unknown Park' }}</h2>
      <h5 class="text-muted mb-3">{{ cartItem?.activityName || 'Unknown Activity' }}</h5>
      <hr class="border-2 mb-4">

      <div class="step-container">
        <h3 class="step-title">Equipment & Vehicle Information</h3>
        <p class="step-description">Please provide your vehicle information for this reservation.</p>

        <!-- Vehicle Information Form -->
        <div class="vehicle-info-section">
          <div class="row">
            <div class="col-md-6">
              <ngds-text-input
                label="Plate Number"
                [control]="form?.get('equipmentInfo')?.get('licensePlate')"
                placeholder="Enter license plate number"
              >
                <div ngdsInputPrepend>
                  <i class="fa-solid fa-car ms-3"></i>
                </div>
              </ngds-text-input>
            </div>
            <div class="col-md-6">
              <div class="mb-3">
                <label for="registeredProvince" class="form-label">Province/State/Other</label>
                <div class="input-group">
                  <span class="input-group-text">
                    <i class="fa-solid fa-map-location-dot"></i>
                  </span>
                  <input
                    id="registeredProvince"
                    type="text"
                    class="form-control"
                    placeholder="Start typing to search..."
                    [formControl]="$any(form?.get('equipmentInfo')?.get('registeredProvince'))"
                    [typeahead]="provincesStates"
                    [typeaheadOptionsLimit]="5"
                    [typeaheadMinLength]="0"
                  />
                </div>
                <small class="form-text text-muted">Select or type your province/state/other</small>
              </div>
            </div>
          </div>
        </div>

      

        <!-- Navigation Buttons -->
        <div class="d-flex justify-content-between border-top pt-3 mt-5">
          <button
            type="button"
            class="btn btn-outline-primary mb-3"
            (click)="goToPrevious()"
          >
            <i class="fa-solid fa-chevron-left me-2"></i>
            Back
          </button>
          <button
            type="button"
            class="btn btn-primary mb-3"
            [disabled]="!isStepValid()"
            (click)="goToNext()"
          >
            Continue
            <i class="fa-solid fa-chevron-right ms-2"></i>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
