<div *ngIf="breadcrumbs.length > 1">
 
  <!-- Breadcrumb Navigation -->
  <nav aria-label="breadcrumb" class="pt-4 mb-5">
    <ol class="breadcrumb custom-breadcrumb">
      <ng-container *ngFor="let breadcrumb of breadcrumbs; let last = last; let first = first">
        <li class="breadcrumb-item" [class.active]="last" [attr.aria-current]="last ? 'page' : null">
          <a 
            *ngIf="!last" 
            [routerLink]="[breadcrumb.url]" 
            class="text-decoration-none">
            {{ breadcrumb.label }}
          </a>
          <span *ngIf="last">{{ breadcrumb.label }}</span>
        </li>
        <li *ngIf="!last" class="breadcrumb-separator">
          <i class="fa-solid fa-chevron-right"></i>
        </li>
      </ng-container>
    </ol>
  </nav>

</div>
