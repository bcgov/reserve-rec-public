<div class="modal-content" id="{{ modal?.id }}">
  <div class="modal-header">
    <h3 class="modal-title">{{ modal?.title }}</h3>
    <button
      type="button"
      class="btn-close"
      data-bs-dismiss="modal"
      aria-label="Close"
      (click)="close()"
    ></button>
  </div>
  <div class="modal-body text-break">
    <div innerHTML="{{ modal?.body }}"></div>
  </div>
  <div class="modal-footer">
    @if (modal?.buttons) {
      <div class="d-flex">
        @for (modalButton of modal?.buttons; track modalButton) {
          <div class="ps-3">
            <button
              class="{{ modalButton?.classes }}"
              (click)="(modalButton?.onClick())"
              >
              {{ modalButton?.text }}
            </button>
          </div>
        }
      </div>
    }
  </div>
</div>
